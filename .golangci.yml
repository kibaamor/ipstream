version: "2"

linters:
  default: standard
  enable:
    - misspell # catch spelling mistakes in comments and strings
    - gocritic # miscellaneous code checks
    - revive # idiomatic Go checks (replaces golint)
    - prealloc # suggest slice pre-allocation
    - errorlint # find problems with error wrapping
    - unconvert # remove unnecessary type conversions
    - gosec # security checks
    - noctx # find http.Get/Post without context
    - unparam # find function params that never change
    - unused # find unused constants, variables, functions and types
    - ineffassign # detect assignments to variables never used afterwards
    - bodyclose # check HTTP response body is closed
    - nilerr # find code returning nil despite a non-nil error check
    - nilnil # check for simultaneous nil error + invalid value return
    - makezero # find slice declarations with non-zero initial length
    - exhaustive # check exhaustiveness of enum switch statements
    - modernize # suggest simplifications using modern Go language and library features

formatters:
  enable:
    - gofumpt # stricter superset of gofmt; covers all gofmt rules plus more
    - goimports # enforce import grouping and ordering
